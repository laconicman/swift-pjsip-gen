name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Guard duplicated plugin sources
        run: |
          ./scripts/check-duplicate-sources.sh --common \
            Sources/PJSIPSwiftGenCore Plugins/PJSIPSwiftGenPlugin
